<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BornaNix</title>

  <meta name="description" content="BornaNix official website." />
  <meta name="robots" content="index, follow" />

  <link rel="canonical" href="https://bornanix.com/" />
  <link rel="alternate" hreflang="en" href="https://bornanix.com/en/" />
  <link rel="alternate" hreflang="fa" href="https://bornanix.com/fa/" />
  <link rel="alternate" hreflang="x-default" href="https://bornanix.com/" />
  <link rel="icon" href="/favicon.svg?v=3" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg?v=3" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="BornaNix" />
  <meta property="og:image" content="https://bornanix.com/og-image.png" />
  <meta property="og:image:secure_url" content="https://bornanix.com/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://bornanix.com/og-image.png" />
  <meta property="og:title" content="BornaNix" />
  <meta property="og:description" content="Modern healthcare software platform." />
  <meta property="og:url" content="https://bornanix.com/" />

  <meta name="twitter:title" content="BornaNix" />
  <meta name="twitter:description" content="Modern healthcare software platform." />

  <script>
    (function () {
      var savedLanguage = localStorage.getItem("bornanix_language");

      if (savedLanguage === "fa") {
        window.location.replace("/fa/");
        return;
      }

      if (savedLanguage === "en") {
        window.location.replace("/en/");
        return;
      }

      var languages = navigator.languages || [navigator.language || navigator.userLanguage || "en"];
      var normalizedLanguages = languages.map(function (lang) {
        return String(lang).toLowerCase();
      });

      var isPersian =
        normalizedLanguages.some(function (lang) {
          return lang === "fa" ||
            lang.startsWith("fa-") ||
            lang === "fa-ir" ||
            lang === "prs" ||
            lang === "ps";
        });

      if (isPersian) {
        window.location.replace("/fa/");
      } else {
        window.location.replace("/en/");
      }
    })();
  </script>

  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.72);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --cyan: #67e8f9;
      --purple: #a78bfa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 211, 238, 0.22), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.24), transparent 30%),
        linear-gradient(135deg, #020617, #0f172a);
    }

    .card {
      width: min(520px, 100%);
      padding: 34px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
      text-align: center;
    }

    .brand {
      font-family: 'Inter', sans-serif;
      /* فونت مخصوص برند */
      font-size: clamp(48px, 8vw, 86px);
      line-height: 1;
      /* بهتره برای برند ۱ باشه */
      font-weight: 900;
      margin-bottom: 0.5rem;
      position: relative;
      display: inline-block;
      direction: ltr;
      /* برای انگلیسی */
      text-align: right;

      /* حل مشکل چسبندگی حروف */
      letter-spacing: -0.01em;
      /* فاصله رو از منفی ۰.۰۴ به منفی ۰.۰۱ تغییر دادم */
      font-variant-ligatures: none;
      font-feature-settings: "liga" 0, "calt" 0;
      text-rendering: optimizeLegibility;
    }


    p {
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .loader {
      width: 48px;
      height: 48px;
      margin: 0 auto 22px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--cyan);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      color: #020617;
      text-decoration: none;
      font-weight: 800;
      padding: 12px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
    }

    a.secondary {
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }
  </style>
  

</head>

<body>
  <main class="card">
    <div class="loader"></div>

    <h1 class="brand">Bor‌naNix</h1>

    <p>
      Detecting your preferred language...
      <br />
      در حال تشخیص زبان مناسب...
    </p>

    <div class="actions">
      <a href="/en/" onclick="localStorage.setItem('bornanix_language', 'en')">
        English
      </a>

      <a class="secondary" href="/fa/" onclick="localStorage.setItem('bornanix_language', 'fa')">
        فارسی
      </a>
    </div>
  </main>
</body>

</html>
