<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">BornaNix</title>
  <desc id="desc">BornaNix BN monogram favicon</desc>

  <defs>
    <linearGradient
      id="background"
      x1="8"
      y1="6"
      x2="56"
      y2="58"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="55%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>

    <filter
      id="softShadow"
      x="-20%"
      y="-20%"
      width="140%"
      height="150%"
    >
      <feDropShadow
        dx="0"
        dy="3"
        stdDeviation="2.5"
        flood-color="#020617"
        flood-opacity="0.28"
      />
    </filter>
  </defs>

  <!-- Dark outer frame -->
  <rect
    x="3"
    y="3"
    width="58"
    height="58"
    rx="18"
    fill="#020617"
  />

  <!-- Gradient background -->
  <rect
    x="6"
    y="6"
    width="52"
    height="52"
    rx="15"
    fill="url(#background)"
  />

  <!-- Letter B: moved slightly to the left -->
  <path
    d="
      M11.5 45.5
      V18.5
      H22.6

      C28.3 18.5 31.7 21.3 31.7 25.6
      C31.7 28.2 30.4 30.1 28.2 31.2

      C31.1 32.2 32.8 34.4 32.8 37.4
      C32.8 42.3 29.1 45.5 22.8 45.5
      H11.5

      Z

      M18.2 24.2
      V29
      H21.8
      C23.9 29 25 28.2 25 26.6
      C25 25 23.9 24.2 21.8 24.2
      H18.2

      Z

      M18.2 34.4
      V39.8
      H22.4
      C24.8 39.8 26 38.9 26 37.1
      C26 35.3 24.8 34.4 22.4 34.4
      H18.2

      Z
    "
    fill="#ffffff"
    fill-rule="evenodd"
    filter="url(#softShadow)"
  />

  <!-- Letter N: resized and kept fully inside the frame -->
  <path
    d="
      M35.8 45.5
      V18.5
      H41.4
      L50 32.9
      V18.5
      H55.5
      V45.5
      H50
      L41.4 31.1
      V45.5
      H35.8
      Z
    "
    fill="#ffffff"
    filter="url(#softShadow)"
  />
</svg>
